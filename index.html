<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Untuk Kamu ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url("pink.jpeg") no-repeat center center/cover;
  height: 100vh;
  color: white;
  position: relative;
}

/* center */
.wrapper {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* text */
h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.subtitle {
  margin-bottom: 25px;
  font-style: italic;
}

/* slider */
.slider {
  position: relative;
  overflow: hidden;
  width: 80%;
  max-width: 900px;
}

/* fade pinggir */
.slider::before,
.slider::after {
  content: "";
  position: absolute;
  top: 0;
  width: 120px;
  height: 100%;
  z-index: 2;
}

.slider::before {
  left: 0;
  background: linear-gradient(to right, #ff4d6d, transparent);
}

.slider::after {
  right: 0;
  background: linear-gradient(to left, #ff4d6d, transparent);
}

/* track */
.slide-track {
  display: flex;
  width: calc(300px * 8);
  animation: scroll 18s linear infinite;
}

/* gambar */
.slide-track img {
  width: 300px;
  height: 180px;
  object-fit: cover;
  margin: 10px;
  border-radius: 20px;
  transition: transform 0.4s, box-shadow 0.4s;
  cursor: pointer;
}

.slide-track img:hover {
  transform: scale(1.1);
  box-shadow: 0 10px 30px rgba(255,255,255,0.5);
}

/* animasi */
@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* hearts */
.hearts {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
}

.heart {
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: jatuh linear infinite;
}

@keyframes jatuh {
  0% { transform: translateY(-10vh); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* modal */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal-box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  width: 70%;
  margin: 10% auto;
  padding: 20px;
  border-radius: 20px;
}

.modal-box img {
  width: 300px;
  border-radius: 15px;
}

.modal-text {
  max-width: 400px;
}

.close {
  position: absolute;
  top: 20px;
  right: 40px;
  font-size: 35px;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="hearts"></div>

<div class="wrapper">
  <h1>💖 BUAT JLEKKKK 💖</h1>
  <p class="subtitle">Buat Giovany Yang bntr lagi UTBK 🌊❤️</p>

  <div class="slider">
    <div class="slide-track">
      <img src="gio1.jpeg">
      <img src="gio2.jpeg">
      <img src="gio3.jpeg">
      <img src="gio4.jpeg">

      <!-- duplikat -->
      <img src="gio1.jpeg">
      <img src="gio2.jpeg">
      <img src="gio3.jpeg">
      <img src="gio4.jpeg">
    </div>
  </div>
</div>

<!-- modal -->
<div id="modal" class="modal">
  <span class="close">&times;</span>
  <div class="modal-box">
    <img id="modal-img">
    <div class="modal-text">
      <h3 id="judul"></h3>
      <p id="deskripsi"></p>
    </div>
  </div>
</div>

<!-- audio -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const music = document.getElementById("music");

// autoplay fix
document.body.addEventListener("click", () => {
  music.play();
}, { once: true });

// hearts
const heartsContainer = document.querySelector(".hearts");

function buatHati() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

  heartsContainer.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(buatHati, 300);

// modal
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const judul = document.getElementById("judul");
const deskripsi = document.getElementById("deskripsi");
const closeBtn = document.querySelector(".close");

// DATA FOTO
const dataFoto = [
  {
    src: "gio1.jpeg",
    judul: "Pertama Kali Ketemu",
    deskripsi: "Hari itu sederhana, tapi sejak itu semuanya berubah jadi lebih indah."
  },
  {
    src: "gio2.jpeg",
    judul: "Momen Bahagia",
    deskripsi: "Ketawa bareng kamu selalu jadi hal favoritku."
  },
  {
    src: "gio3.jpeg",
    judul: "Kenangan Indah",
    deskripsi: "Setiap momen sama kamu selalu aku simpan baik-baik."
  },
  {
    src: "gio4.jpeg",
    judul: "Hari Spesial",
    deskripsi: "Aku harap kita bisa terus seperti ini, selamanya."
  }
];

const images = document.querySelectorAll(".slide-track img");

images.forEach((img, i) => {
  img.addEventListener("click", () => {
    const data = dataFoto[i % dataFoto.length];

    modal.style.display = "block";
    modalImg.src = data.src;
    judul.innerText = data.judul;
    deskripsi.innerText = data.deskripsi;
  });
});

closeBtn.onclick = () => modal.style.display = "none";
modal.onclick = () => modal.style.display = "none";
</script>

</body>
</html>
